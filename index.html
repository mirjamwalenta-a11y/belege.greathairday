<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#2C2438"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Meine Belege</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#1A1414;--ink2:#5C5055;--ink3:#9C8E92;
      --canvas:#F7F4F2;--surface:#FFF;
      --accent:#2C2438;--accent2:#3D2F4E;--accentlight:#C8B8D8;
      --red:#B85C4A;--green:#4A8A6C;
      --border:#E4DCE8;--radius:14px;--shadow:0 1px 6px rgba(44,36,56,0.09);
    }
    html,body{height:100%;background:var(--canvas);font-family:'Inter',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
    body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100dvh}
    .fullscreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:24px;max-width:480px;margin:0 auto}
    .dark-screen{background:var(--accent)}
    .light-screen{background:var(--canvas);justify-content:flex-start;padding-top:40px;overflow-y:auto}
    .auth-logo{font-size:48px;margin-bottom:8px}
    .auth-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:6px}
    .auth-sub{color:var(--accentlight);font-size:13px;margin-bottom:28px;text-align:center}
    .auth-form{width:100%;display:flex;flex-direction:column;gap:10px}
    .auth-inp{width:100%;padding:13px 14px;border:none;border-radius:10px;font-size:15px;font-family:inherit;background:rgba(255,255,255,0.12);color:#fff;outline:none}
    .auth-inp::placeholder{color:rgba(255,255,255,0.5)}
    .auth-btn{width:100%;padding:14px;border:none;border-radius:10px;background:#fff;color:var(--accent);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px}
    .auth-switch{color:var(--accentlight);font-size:13px;margin-top:14px;cursor:pointer;text-align:center}
    .auth-switch span{color:#fff;font-weight:600;text-decoration:underline;cursor:pointer}
    .auth-error{color:#F4A49A;font-size:12px;text-align:center;min-height:18px}
    .pin-logo-emoji{font-size:48px;margin-bottom:8px}
    .pin-logo-img{width:140px;height:60px;object-fit:contain;margin-bottom:12px;filter:brightness(0) invert(1)}
    .pin-brand{color:var(--accentlight);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
    .pin-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:28px}
    .pin-dots{display:flex;gap:14px;margin-bottom:28px}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--accentlight);background:transparent;transition:background 0.15s}
    .pin-dot.filled{background:#fff;border-color:#fff}
    .pin-error{color:#F4A49A;font-size:13px;margin-bottom:16px;min-height:20px;text-align:center}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px}
    .pin-btn{aspect-ratio:1;border-radius:50%;border:none;background:rgba(255,255,255,0.1);color:#fff;font-size:22px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .pin-btn:active{background:rgba(255,255,255,0.25)}
    .pin-btn.empty{background:transparent;cursor:default}
    .pin-logout{color:var(--accentlight);font-size:12px;margin-top:20px;cursor:pointer;background:none;border:none}
    .setup-header{text-align:center;margin-bottom:28px;width:100%}
    .setup-header h1{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:6px}
    .setup-header p{font-size:13px;color:var(--ink3);line-height:1.5}
    .setup-section{width:100%;margin-bottom:20px}
    .setup-label{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .setup-inp{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);outline:none}
    .logo-upload-zone{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:#fff}
    .logo-preview{max-width:180px;max-height:70px;object-fit:contain;margin:0 auto;display:block}
    .kat-list{display:flex;flex-direction:column;gap:8px}
    .kat-row{display:flex;gap:8px;align-items:center}
    .kat-emoji-inp{width:48px;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:18px;text-align:center;background:#fff;outline:none}
    .kat-name-inp{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);outline:none}
    .kat-del{width:36px;height:36px;border:none;background:#FEF0EE;color:var(--red);border-radius:8px;cursor:pointer;font-size:16px}
    .add-kat-btn{width:100%;padding:10px;border:1.5px dashed var(--border);border-radius:8px;background:none;color:var(--ink3);font-size:13px;font-family:inherit;cursor:pointer;margin-top:4px}
    .setup-save{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px}
    .ai-badge{text-align:center;margin-top:16px;font-size:11px;color:var(--ink3);letter-spacing:1px}
    .header{background:var(--accent);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(44,36,56,0.25)}
    .header-left{display:flex;align-items:center;gap:10px}
    .header-logo-img{height:34px;width:auto;object-fit:contain;filter:brightness(0) invert(1);opacity:0.92}
    .header-logo-emoji{font-size:22px}
    .header-title{color:#fff;font-size:16px;font-weight:700}
    .header-sub{color:var(--accentlight);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1px}
    .month-select{background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:6px 8px;font-size:12px;font-family:inherit;cursor:pointer;outline:none}
    .nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;position:sticky;top:62px;z-index:99}
    .nav-btn{flex:1;padding:12px 4px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--ink3);font-family:inherit;border-bottom:2px solid transparent}
    .nav-btn.active{color:var(--accent);font-weight:700;border-bottom-color:var(--accent)}
    .main{flex:1;padding:18px 16px 100px;overflow-y:auto}
    .card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .stat-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
    .stat-value{font-size:20px;font-weight:700;letter-spacing:-0.5px}
    .stat-sub{font-size:11px;color:var(--ink3);margin-top:3px}
    .bar-track{background:#F0EAF4;border-radius:4px;height:5px;margin-top:4px}
    .bar-fill{border-radius:4px;height:5px;transition:width 0.4s}
    .beleg-item{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
    .beleg-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;border-radius:6px;padding:2px 7px;margin-bottom:5px}
    .beleg-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .beleg-desc{font-size:12px;color:var(--ink2);margin-top:2px}
    .beleg-amount{font-size:16px;font-weight:700;white-space:nowrap}
    .beleg-actions{display:flex;gap:8px;margin-top:10px}
    .btn-sm{flex:1;padding:7px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500}
    .btn-edit{background:#F5F0F8;color:var(--ink2)}
    .btn-del{background:#FEF0EE;color:var(--red)}
    .empty{text-align:center;padding:48px 20px;color:var(--ink3)}
    .empty-icon{font-size:40px;margin-bottom:12px}
    .btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:14px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
    .btn-outline{background:none;border:1.5px solid var(--accent);color:var(--accent);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
    .upload-zone{border:2px dashed var(--accentlight);border-radius:var(--radius);padding:32px 20px;text-align:center;cursor:pointer;background:var(--surface);margin-bottom:16px}
    .upload-zone.drag{background:#F0EAF4;border-color:var(--accent)}
    .form-group{display:flex;flex-direction:column;gap:9px}
    .form-row{display:flex;gap:9px}
    .inp{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:#FAFAF8;color:var(--ink);outline:none}
    .inp:focus{border-color:var(--accent)}
    select.inp{cursor:pointer}
    .section-title{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:10px}
    .edit-form{display:flex;flex-direction:column;gap:8px}
    .edit-actions{display:flex;gap:8px;margin-top:4px}
    .btn-save{flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
    .btn-cancel{flex:1;background:#F0EAF4;color:var(--ink2);border:none;border-radius:8px;padding:10px;font-size:13px;font-family:inherit;cursor:pointer}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border-radius:10px;padding:11px 22px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(44,36,56,0.3);z-index:9999;animation:toastIn 0.2s ease;white-space:nowrap}
    .toast.err{background:var(--red)}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .analyzing{display:flex;align-items:center;gap:8px;background:#F0EAF4;border-radius:9px;padding:12px 14px;margin-bottom:14px}
    .analyzing-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 0.8s ease-in-out infinite alternate}
    @keyframes pulse{to{opacity:0.3}}
    .key-section{background:#F0EAF4;border-radius:9px;padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
  </style>
</head>
<body>
<div id="app" style="display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:12px">
  <div class="spinner"></div>
  <div style="color:var(--ink3);font-size:13px">Wird geladen…</div>
</div>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SB_URL = 'https://lpuxvvfrrcnbuzafscyk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwdXh2dmZycmNuYnV6YWZzY3lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODIxNDcsImV4cCI6MjEwMDI1ODE0N30.6VZUmmXj_x3Q8J55s_tbOHcW5-U5OXllGoEBhypaVfI';
const MONATE=['Jänner','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const DEFAULT_KATS=[
  {id:'k1',icon:'🛒',label:'Einkauf & Material'},
  {id:'k2',icon:'🏠',label:'Miete & Betriebskosten'},
  {id:'k3',icon:'👥',label:'Personal & Lohn'},
  {id:'k4',icon:'🔧',label:'Geräte & Werkzeug'},
  {id:'k5',icon:'📱',label:'Marketing & Website'},
  {id:'k6',icon:'📋',label:'Versicherung & Steuer'},
  {id:'k7',icon:'📦',label:'Sonstiges'},
];

// ── Supabase REST helpers ────────────────────────────────────────────────────
function sbHeaders(token){
  const h={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(token||SB_KEY)};
  return h;
}
async function sbPost(path,body,token){
  let r=await fetch(SB_URL+path,{method:'POST',headers:sbHeaders(token),body:JSON.stringify(body)});
  if(r.status===401&&token){try{await refreshToken();r=await fetch(SB_URL+path,{method:'POST',headers:sbHeaders(S.token),body:JSON.stringify(body)});}catch(e){S.screen='auth';render();throw e;}}
  return r.json();
}
async function sbGet(path,token){
  let r=await fetch(SB_URL+path,{headers:{...sbHeaders(token),'Accept':'application/json'}});
  if(r.status===401){try{await refreshToken();r=await fetch(SB_URL+path,{headers:{...sbHeaders(S.token),'Accept':'application/json'}});}catch(e){S.screen='auth';render();throw e;}}
  return r.json();
}
async function sbPatch(path,body,token){
  let r=await fetch(SB_URL+path,{method:'PATCH',headers:{...sbHeaders(token),'Prefer':'return=representation'},body:JSON.stringify(body)});
  if(r.status===401){try{await refreshToken();r=await fetch(SB_URL+path,{method:'PATCH',headers:{...sbHeaders(S.token),'Prefer':'return=representation'},body:JSON.stringify(body)});}catch(e){S.screen='auth';render();throw e;}}
  return r.json();
}
async function sbDelete(path,token){
  await fetch(SB_URL+path,{method:'DELETE',headers:sbHeaders(token)});
}

// Auth
async function signUp(email,password){
  const d=await sbPost('/auth/v1/signup',{email,password});
  if(d.error)throw new Error(d.error.message||d.msg||'Fehler');
  return d;
}
async function signIn(email,password){
  const d=await sbPost('/auth/v1/token?grant_type=password',{email,password});
  if(d.error)throw new Error(d.error.message||d.msg||'Fehler');
  if(d.refresh_token)try{localStorage.setItem('sb_refresh',d.refresh_token);}catch(e){}
  return d;
}
async function refreshToken(){
  const rt=localStorage.getItem('sb_refresh');
  if(!rt)throw new Error('Kein Refresh-Token');
  const d=await sbPost('/auth/v1/token?grant_type=refresh_token',{refresh_token:rt});
  if(d.error)throw new Error(d.error.message||'Token abgelaufen');
  S.token=d.access_token;
  if(d.refresh_token)try{localStorage.setItem('sb_refresh',d.refresh_token);}catch(e){}
  saveLocal();
  return d;
}
async function signOut(token){
  await sbPost('/auth/v1/logout',{},token);
}

// ── State ─────────────────────────────────────────────────────────────────────
let S={
  screen:'loading',
  token:null,userId:null,
  profile:null,
  pinInput:'',pinError:'',
  belege:[],
  ansicht:'dashboard',
  monat:getMonat(),
  editId:null,editData:{},
  manuell:emptyM(),
  loading:false,
  apiKey:'',showKeyInput:false,
  authMode:'login',
  authEmail:'',authPass:'',authName:'',authErr:'',
  draft:null,
};

function emptyM(){return{datum:'',betrag:'',art:'ausgabe',lieferant:'',kategorie:'',beschreibung:''};}
function getMonat(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function mL(k){if(!k)return'';const[y,m]=k.split('-');return MONATE[parseInt(m)-1]+' '+y;}
function eur(n){return(n||0).toLocaleString('de-AT',{style:'currency',currency:'EUR'});}
function kk(id){const kats=S.profile?.kategorien||DEFAULT_KATS;return kats.find(k=>k.id===id)||kats[kats.length-1];}

// ── Storage ────────────────────────────────────────────────────────────────────
function saveLocal(){
  try{
    if(S.token){localStorage.setItem('sb_token',S.token);sessionStorage.setItem('sb_token',S.token);}
    if(S.userId){localStorage.setItem('sb_uid',S.userId);sessionStorage.setItem('sb_uid',S.userId);}
    if(S.apiKey)localStorage.setItem('sb_apikey',S.apiKey);
  }catch(e){}
}
function loadLocal(){
  try{
    S.token=sessionStorage.getItem('sb_token')||localStorage.getItem('sb_token');
    S.userId=sessionStorage.getItem('sb_uid')||localStorage.getItem('sb_uid');
    S.apiKey=localStorage.getItem('sb_apikey')||'';
  }catch(e){}
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let tTimer;
function toast(msg,type='ok'){
  clearTimeout(tTimer);
  let t=document.querySelector('.toast');if(t)t.remove();
  t=document.createElement('div');t.className='toast'+(type==='err'?' err':'');t.textContent=msg;
  document.body.appendChild(t);tTimer=setTimeout(()=>t.remove(),3200);
}

// ── API calls ─────────────────────────────────────────────────────────────────
async function loadProfile(){
  const d=await sbGet('/rest/v1/profiles?id=eq.'+S.userId+'&select=*',S.token);
  if(Array.isArray(d)&&d.length>0){S.profile=d[0];return true;}
  return false;
}
async function upsertProfile(data){
  const body={id:S.userId,name:data.name,pin:data.pin,emoji:data.emoji,kategorien:data.kategorien};
  const r=await fetch(SB_URL+'/rest/v1/profiles',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'apikey':SB_KEY,
      'Authorization':'Bearer '+S.token,
      'Prefer':'resolution=merge-duplicates,return=representation'
    },
    body:JSON.stringify(body)
  });
  const result=await r.json();
  if(!r.ok){
    console.error('Profil-Fehler:',result);
    throw new Error(result.message||result.error||'Profil konnte nicht gespeichert werden');
  }
  return result;
}
async function loadBelege(){
  const d=await sbGet('/rest/v1/belege?user_id=eq.'+S.userId+'&order=erfasst.desc&select=*',S.token);
  if(Array.isArray(d))S.belege=d;
}
async function insertBeleg(b){
  const r=await fetch(SB_URL+'/rest/v1/belege',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'apikey':SB_KEY,
      'Authorization':'Bearer '+S.token,
      'Prefer':'return=representation'
    },
    body:JSON.stringify({...b,user_id:S.userId})
  });
  const d=await r.json();
  if(!r.ok){
    console.error('Beleg-Fehler:',d);
    throw new Error(d.message||d.error||'Beleg konnte nicht gespeichert werden');
  }
  if(Array.isArray(d)&&d[0])S.belege.unshift(d[0]);
  else await loadBelege();
}
async function updateBelegDB(id,data){
  await sbPatch('/rest/v1/belege?id=eq.'+id+'&user_id=eq.'+S.userId,data,S.token);
  S.belege=S.belege.map(b=>b.id===id?{...b,...data}:b);
}
async function deleteBelegDB(id){
  await sbDelete('/rest/v1/belege?id=eq.'+id+'&user_id=eq.'+S.userId,S.token);
  S.belege=S.belege.filter(b=>b.id!==id);
}

// ── Auth actions ──────────────────────────────────────────────────────────────
async function doLogin(){
  S.authErr='';render();
  try{
    const d=await signIn(S.authEmail,S.authPass);
    S.token=d.access_token;S.userId=d.user?.id;
    saveLocal();
    await afterLogin();
  }catch(e){S.authErr=e.message;render();}
}
async function doRegister(){
  S.authErr='';render();
  if(!S.authName.trim()){S.authErr='Bitte Name eingeben';render();return;}
  try{
    await signUp(S.authEmail,S.authPass);
    const d=await signIn(S.authEmail,S.authPass);
    S.token=d.access_token;S.userId=d.user?.id;
    saveLocal();
    await afterLogin();
  }catch(e){S.authErr=e.message;render();}
}
async function doLogout(){
  try{await signOut(S.token);}catch(e){}
  localStorage.removeItem('sb_token');localStorage.removeItem('sb_uid');
  S.token=null;S.userId=null;S.profile=null;S.belege=[];
  S.screen='auth';render();
}
async function afterLogin(){
  if(!S.token||!S.userId){
    S.screen='auth';render();return;
  }
  const has=await loadProfile();
  if(!has){
    S.screen='setup';
    S.draft={name:S.authName||'',logo:'',emoji:'💼',pin:'',kategorien:DEFAULT_KATS.map(k=>({...k}))};
  }else{
    const pinOk=sessionStorage.getItem('pin_ok');
    S.screen=pinOk===S.userId?'app':'pin';
    if(S.screen==='app')await loadBelege();
  }
  render();
}

// ── PIN ────────────────────────────────────────────────────────────────────────
function pinPress(d){
  if(S.pinInput.length>=4)return;
  S.pinInput+=d;
  if(S.pinInput.length===4){
    if(S.pinInput===S.profile?.pin){
      S.screen='app';S.pinError='';
      sessionStorage.setItem('pin_ok',S.userId);
      loadBelege().then(()=>render());
    }else{
      S.pinError='Falscher PIN — nochmal versuchen.';
      setTimeout(()=>{S.pinInput='';S.pinError='';render();},900);
      S.pinInput='';
    }
  }
  render();
}
function pinDel(){if(S.pinInput.length>0){S.pinInput=S.pinInput.slice(0,-1);render();}}

// ── Setup ──────────────────────────────────────────────────────────────────────
function handleLogoUpload(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{S.draft.logo=e.target.result;render();};
  r.readAsDataURL(file);
}
async function saveSetup(){
  const d=S.draft;
  if(!d.name.trim()){toast('Bitte Name eingeben','err');return;}
  if(!d.pin||d.pin.length<4){toast('PIN muss 4 Ziffern haben','err');return;}
  const kats=d.kategorien.filter(k=>k.label.trim());
  const profileData={name:d.name.trim(),logo_url:d.logo||'',emoji:d.emoji||'💼',pin:d.pin,kategorien:kats};
  try{
    await upsertProfile(profileData);
  }catch(e){
    toast(e.message,'err');
    return;
  }
  S.profile=profileData;
  S.screen='app';
  sessionStorage.setItem('pin_ok',S.userId);
  await loadBelege();render();toast('Einrichtung gespeichert ✓');
}

// ── Claude ────────────────────────────────────────────────────────────────────
async function analyzeClaude(text,filename){
  if(!S.apiKey)throw new Error('kein_key');
  const kats=S.profile?.kategorien||DEFAULT_KATS;
  const prompt='Analysiere diesen Beleg und gib NUR JSON zurück:\n{"datum":"YYYY-MM-DD","betrag":Zahl,"art":"ausgabe","lieferant":"Name","kategorie":"'+kats.map(k=>k.id).join('/')+'","beschreibung":"max 60 Zeichen"}\nKategorien: '+kats.map(k=>k.id+'='+k.label).join(', ')+'\nDatei: '+filename+'\n'+text.substring(0,1500);
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:prompt}]})});
  const data=await r.json();
  return JSON.parse(data.content?.map(i=>i.text||'').join('').trim().replace(/```json|```/g,'').trim());
}
async function verarbeiteFile(file){
  S.loading=true;render();
  try{
    let text=file.name;
    if(file.type==='text/plain')text=await file.text();
    else if(file.type==='application/pdf')text='PDF: '+file.name;
    else if(file.type.startsWith('image/'))text='Bild: '+file.name;
    let res;
    try{res=await analyzeClaude(text,file.name);}
    catch(e){
      if(e.message==='kein_key'){S.showKeyInput=true;S.loading=false;S.ansicht='neu';render();toast('Bitte API-Key eingeben','err');return;}
      const kats=S.profile?.kategorien||DEFAULT_KATS;
      res={datum:new Date().toISOString().split('T')[0],betrag:0,art:'ausgabe',lieferant:file.name.replace(/\.[^.]+$/,''),kategorie:kats[kats.length-1].id,beschreibung:file.name};
    }
    const kats=S.profile?.kategorien||DEFAULT_KATS;
    const monat=res.datum?res.datum.substring(0,7):S.monat;
    await insertBeleg({datum:res.datum||new Date().toISOString().split('T')[0],betrag:res.betrag||0,art:res.art||'ausgabe',lieferant:res.lieferant||file.name,kategorie:res.kategorie||kats[0].id,beschreibung:res.beschreibung||file.name,monat,dateiname:file.name});
    toast('Beleg erfasst ✓');
  }catch(e){toast('Fehler: '+e.message,'err');}
  S.loading=false;render();
}

function exportCSV(){
  const liste=S.belege.filter(b=>b.monat===S.monat);
  if(!liste.length){toast('Keine Belege','err');return;}
  const kopf='Datum;Lieferant;Beschreibung;Kategorie;Art;Betrag\n';
  const z=liste.map(b=>b.datum+';'+(b.lieferant||'')+';'+(b.beschreibung||'')+';'+(kk(b.kategorie)?.label||'')+';'+(b.art==='ausgabe'?'Ausgabe':'Einnahme')+';'+(b.betrag||0).toFixed(2)).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+kopf+z],{type:'text/csv;charset=utf-8;'}));
  a.download='Belege_'+mL(S.monat).replace(' ','_')+'.csv';a.click();toast('CSV exportiert ✓');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot(){
  loadLocal();
  if(S.userId){
    if(!S.token||localStorage.getItem('sb_refresh')){
      try{await refreshToken();}catch(e){}
    }
    if(S.token){
      try{await afterLogin();}
      catch(e){S.token=null;S.userId=null;S.screen='auth';render();}
    }else{
      S.screen='auth';render();
    }
  }else{
    S.screen='auth';render();
  }
}

function addKat(){
  S.draft.kategorien.push({id:'k'+Date.now(),icon:'📦',label:''});
  render();
}
function removeKat(i){
  S.draft.kategorien.forEach((_,idx)=>{
    const e=document.getElementById('ke'+idx);
    const n=document.getElementById('kn'+idx);
    if(e)S.draft.kategorien[idx].icon=e.value;
    if(n)S.draft.kategorien[idx].label=n.value;
  });
  S.draft.kategorien.splice(i,1);
  render();
}
async function collectAndSave(){
  const name=document.getElementById('sname')?.value?.trim();
  const emoji=document.getElementById('semoji')?.value||'💼';
  const pin=document.getElementById('spin')?.value;
  S.draft.kategorien.forEach((_,i)=>{
    const e=document.getElementById('ke'+i);
    const n=document.getElementById('kn'+i);
    if(e)S.draft.kategorien[i].icon=e.value;
    if(n)S.draft.kategorien[i].label=n.value;
  });
  S.draft.name=name||'';
  S.draft.emoji=emoji;
  S.draft.pin=pin||'';
  await saveSetup();
}

  const lieferantEl=document.querySelector('#manuell-lieferant');
  const beschEl=document.querySelector('#manuell-beschreibung');
  const betragEl=document.querySelector('#manuell-betrag');
  const artEl=document.querySelector('#manuell-art');
  const katEl=document.querySelector('#manuell-kategorie');
  if(datumEl)S.manuell.datum=datumEl.value;
  if(lieferantEl)S.manuell.lieferant=lieferantEl.value;
  if(beschEl)S.manuell.beschreibung=beschEl.value;
  if(betragEl)S.manuell.betrag=betragEl.value;
  if(artEl)S.manuell.art=artEl.value;
  if(katEl)S.manuell.kategorie=katEl.value;
  if(!S.manuell.betrag||!S.manuell.beschreibung){toast('Betrag und Beschreibung sind Pflichtfelder','err');return;}
  const kats=S.profile?.kategorien||DEFAULT_KATS;
  // FIX: Sicherstellen dass immer eine gültige Kategorie vorhanden ist
  if(!S.manuell.kategorie||!kats.find(k=>k.id===S.manuell.kategorie)){
    S.manuell.kategorie=kats[0].id;
  }
  const monat=S.manuell.datum?S.manuell.datum.substring(0,7):S.monat;
  try{
    await insertBeleg({datum:S.manuell.datum||new Date().toISOString().split('T')[0],betrag:parseFloat(String(S.manuell.betrag).replace(',','.')),art:S.manuell.art||'ausgabe',lieferant:S.manuell.lieferant||'',kategorie:S.manuell.kategorie||kats[0].id,beschreibung:S.manuell.beschreibung,monat});
    S.manuell=emptyM();S.ansicht='belege';render();toast('Beleg gespeichert ✓');
  }catch(e){toast('Fehler beim Speichern: '+e.message,'err');}
}
async function doEdit(){
  const d=S.editData;
  await updateBelegDB(S.editId,{datum:d.datum,betrag:parseFloat(String(d.betrag).replace(',','.')),art:d.art,lieferant:d.lieferant,kategorie:d.kategorie,beschreibung:d.beschreibung});
  S.editId=null;render();
}
function saveKey(){
  const v=document.getElementById('aki')?.value?.trim();
  if(!v){toast('Bitte Key eingeben','err');return;}
  S.apiKey=v;S.showKeyInput=false;
  try{localStorage.setItem('sb_apikey',v);}catch(e){}
  toast('API-Key gespeichert ✓');render();
}

boot();
</script>
</body>
</html>
